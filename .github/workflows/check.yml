name: Check

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  static:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Shell syntax
        run: |
          set -eu
          for file in \
            root/usr/sbin/mitmproxyctl \
            root/etc/init.d/mitmproxy \
            root/etc/uci-defaults/99_luci_mitmproxy
          do
            sh -n "$file"
          done

      - name: LuCI JavaScript syntax
        run: |
          set -eu
          find htdocs/luci-static/resources -name '*.js' -print0 | \
            xargs -0 -n 1 node --check

      - name: JSON metadata
        run: |
          set -eu
          python3 - <<'PY'
          import json
          from pathlib import Path

          for path in Path(".").rglob("*.json"):
              with path.open("r", encoding="utf-8") as handle:
                  json.load(handle)
              print(path)
          PY

      - name: Public residue scan
        run: |
          set -eu
          python3 - <<'PY'
          import re
          import subprocess
          import sys
          from pathlib import Path

          files = [Path(p) for p in subprocess.check_output(["git", "ls-files"], text=True).splitlines()]
          ignored_files = {Path(".gitignore")}
          forbidden_prefixes = ("bin/", "test-" + "artifacts/")
          literal_terms = [
              "id_" + "ed25519",
              "root" + "@",
              "status_" + "v2",
              "r" + "4" + "s",
              "accept" + "ance",
              "\u5b9e\u673a",
              "\u9a8c\u6536",
              "\u9636\u6bb5",
          ]
          regex_rules = [
              ("private IPv4 address", re.compile(r"(?<![\d.])(?:10|172\.(?:1[6-9]|2\d|3[01])|192\.168)\.\d{1,3}\.\d{1,3}(?![\d.])", re.I)),
              ("old phase document marker", re.compile(r"phase-[0-9]", re.I)),
          ]
          failures = []

          for path in files:
              posix = path.as_posix()
              if posix.startswith(forbidden_prefixes):
                  failures.append((posix, 0, "forbidden generated or local artifact path"))
                  continue
              if path in ignored_files:
                  continue
              try:
                  text = path.read_text(encoding="utf-8")
              except UnicodeDecodeError:
                  continue
              for lineno, line in enumerate(text.splitlines(), 1):
                  lowered = line.lower()
                  if any(term.lower() in lowered for term in literal_terms):
                      failures.append((posix, lineno, "forbidden device/test residue"))
                  for label, pattern in regex_rules:
                      if pattern.search(line):
                          failures.append((posix, lineno, label))

          if failures:
              for path, lineno, label in failures:
                  location = f"{path}:{lineno}" if lineno else path
                  print(f"{location}: {label}")
              sys.exit(1)
          PY
