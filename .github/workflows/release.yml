name: Release IPK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to create or update
        required: true
        type: string

permissions:
  contents: write

env:
  OPENWRT_VERSION: 24.10.7
  PACKAGE_NAME: luci-app-mitmproxy

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: x86_64
            target: x86
            subtarget: '64'
          - label: armsr_armv7
            target: armsr
            subtarget: armv7
          - label: armsr_armv8
            target: armsr
            subtarget: armv8
          - label: rockchip_armv8
            target: rockchip
            subtarget: armv8

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install host tools
        run: |
          set -eu
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
            gettext git libncurses-dev libssl-dev python3 python3-setuptools \
            rsync unzip wget zlib1g-dev file zstd

      - name: Download OpenWrt SDK
        run: |
          set -eu
          work_dir="$RUNNER_TEMP/openwrt-sdk-${{ matrix.label }}"
          mkdir -p "$work_dir"
          cd "$work_dir"
          base="https://downloads.openwrt.org/releases/${OPENWRT_VERSION}/targets/${{ matrix.target }}/${{ matrix.subtarget }}"
          index="$(curl -fsSL "$base/")"
          sdk_file="$(printf '%s\n' "$index" | grep -oE 'openwrt-sdk-[^"]+\.tar\.(xz|zst)' | head -n 1)"
          if [ -z "$sdk_file" ]; then
            echo "No SDK archive found at $base"
            exit 1
          fi
          wget -q "$base/$sdk_file"
          case "$sdk_file" in
            *.tar.zst) tar --zstd -xf "$sdk_file" ;;
            *.tar.xz) tar -xf "$sdk_file" ;;
            *) echo "Unsupported SDK archive: $sdk_file"; exit 1 ;;
          esac
          sdk_dir="$(find "$work_dir" -mindepth 1 -maxdepth 1 -type d -name 'openwrt-sdk-*' | head -n 1)"
          if [ -z "$sdk_dir" ]; then
            echo "SDK directory not found after extraction"
            exit 1
          fi
          {
            echo "sdk_file=$sdk_file"
            echo "sdk_dir=$sdk_dir"
          } >> "$GITHUB_ENV"

      - name: Build package
        run: |
          set -eu
          cd "$sdk_dir"
          ./scripts/feeds update -a
          ./scripts/feeds install -a

          package_dir="$sdk_dir/package/feeds/local_mitmproxy/$PACKAGE_NAME"
          mkdir -p "$package_dir"
          rsync -a --delete \
            --exclude='.git' \
            --exclude='bin' \
            --exclude='dist' \
            --exclude='release' \
            --exclude='openwrt-sdk-*' \
            "$GITHUB_WORKSPACE/" "$package_dir/"

          test -f "package/feeds/local_mitmproxy/$PACKAGE_NAME/Makefile"
          rm -rf tmp
          echo "CONFIG_PACKAGE_${PACKAGE_NAME}=m" >> .config
          make defconfig
          grep -q "^CONFIG_PACKAGE_${PACKAGE_NAME}=m$" .config
          make "package/feeds/local_mitmproxy/$PACKAGE_NAME/compile" V=s

          out_dir="$GITHUB_WORKSPACE/dist/${{ matrix.label }}"
          mkdir -p "$out_dir"
          ipk="$(find bin/packages -name "${PACKAGE_NAME}_*_all.ipk" | head -n 1)"
          if [ -z "$ipk" ]; then
            echo "Package IPK not found"
            exit 1
          fi
          cp "$ipk" "$out_dir/"

      - name: Validate IPK metadata
        run: |
          set -eu
          ipk="$(find "dist/${{ matrix.label }}" -name "${PACKAGE_NAME}_*_all.ipk" | head -n 1)"
          work="$(mktemp -d)"
          cp "$ipk" "$work/package.ipk"
          cd "$work"

          if ar t package.ipk >/dev/null 2>&1; then
            ar x package.ipk
          else
            tar -xf package.ipk
          fi

          control_archive="$(find . -maxdepth 1 -name 'control.tar.*' | head -n 1)"
          mkdir control
          case "$control_archive" in
            *.tar.gz) tar -xzf "$control_archive" -C control ;;
            *.tar.xz) tar -xJf "$control_archive" -C control ;;
            *.tar.zst) tar --zstd -xf "$control_archive" -C control ;;
            *) echo "Unsupported control archive: $control_archive"; exit 1 ;;
          esac

          grep -q '^Package: luci-app-mitmproxy$' control/control
          grep -q '^Architecture: all$' control/control
          grep -q '^Depends: .*luci-base' control/control

      - name: Write build summary
        run: |
          set -eu
          out_dir="dist/${{ matrix.label }}"
          ipk="$(find "$out_dir" -name "${PACKAGE_NAME}_*_all.ipk" | head -n 1)"
          {
            echo "OpenWrt: ${OPENWRT_VERSION}"
            echo "Target: ${{ matrix.target }}/${{ matrix.subtarget }}"
            echo "SDK: $sdk_file"
            echo "Package: $(basename "$ipk")"
            sha256sum "$ipk"
          } > "$out_dir/build-summary.txt"

      - name: Upload matrix artifact
        uses: actions/upload-artifact@v4
        with:
          name: ipk-${{ matrix.label }}
          path: dist/${{ matrix.label }}/*

  publish:
    name: Publish release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          set -eu
          mkdir -p release
          canonical="$(find artifacts/ipk-x86_64 -name "${PACKAGE_NAME}_*_all.ipk" | head -n 1)"
          if [ -z "$canonical" ]; then
            echo "Canonical x86_64 IPK not found"
            exit 1
          fi
          cp "$canonical" "release/$(basename "$canonical")"
          find artifacts -name build-summary.txt -print0 | sort -z | xargs -0 cat > release/build-matrix-summary.txt
          find artifacts -name "${PACKAGE_NAME}_*_all.ipk" -print0 | sort -z | xargs -0 sha256sum > release/build-matrix-sha256.txt
          {
            echo "Built with OpenWrt ${OPENWRT_VERSION} SDK matrix."
            echo
            echo "Published package:"
            echo "- $(basename "$canonical")"
            echo
            echo "Validated targets:"
            echo "- x86/64"
            echo "- armsr/armv7"
            echo "- armsr/armv8"
            echo "- rockchip/armv8"
          } > release/RELEASE_NOTES.md

      - name: Resolve tag
        run: |
          set -eu
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          if [ -z "$tag" ]; then
            echo "Release tag is empty"
            exit 1
          fi
          echo "RELEASE_TAG=$tag" >> "$GITHUB_ENV"

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eu
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" release/* --clobber
          else
            gh release create "$RELEASE_TAG" release/* \
              --title "$RELEASE_TAG" \
              --notes-file release/RELEASE_NOTES.md
          fi
